<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wissi KR WebSite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background-color: #ffffff;
            color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 상단 영역: Wissi KR WebSite  ---  [디스코드] */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .discord-link {
            color: #000000;
            text-decoration: none;
            border: 1px solid #000000;
            padding: 6px 12px;
        }

        /* 가로 구분선 */
        hr {
            border: 0;
            border-top: 1px solid #000000;
            width: 100%;
        }

        /* 중앙 영역: Wissi KR Official Website */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .main-title {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .sub-title {
            font-size: 1.5rem;
            color: #555555;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Wissi KR WebSite</div>
        <a href="https://discord.gg/pKeMtqWnws" class="discord-link">[디스코드]</a>
    </header>

    <hr>

    <main>
        <h1 class="main-title">Wissi KR</h1>
        <div class="sub-title">Official Website</div>
    </main>

</body>
</html>
