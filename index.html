<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wissi KR WebSite</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214; /* 다크 모드 배경 */
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 상단 네비게이션 바 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: #1a1a1e;
            border-bottom: 1px solid #2f2f35;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        /* 디스코드 우측 상단 버튼 스타일 */
        .discord-btn {
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background-color 0.2s, transform 0.1s;
        }

        .discord-btn:hover {
            background-color: #4752C4;
            transform: translateY(-1px);
        }

        /* 중앙 메인 콘텐츠 영역 */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        .main-title {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
            background: linear-gradient(45deg, #ffffff, #a5a5b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 1.8rem;
            font-weight: 400;
            color: #9898a0;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        /* 디스코드 임베드 스타일 박스 구현 */
        .embed-container {
            background-color: #1e1f22;
            border-left: 4px solid #2ecc71; /* 이미지와 동일한 초록색 바 */
            border-radius: 4px;
            padding: 16px;
            max-width: 450px;
            width: 100%;
            text-align: left;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .embed-content {
            flex: 1;
            padding-right: 15px;
        }

        .embed-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .embed-description {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #dbdee1;
            margin-bottom: 12px;
        }

        .mention {
            background-color: rgba(88, 101, 242, 0.3);
            color: #c9cdfb;
            padding: 0 4px;
            border-radius: 3px;
            font-weight: 500;
        }

        .embed-footer {
            font-size: 0.75rem;
            color: #949ba4;
        }

        /* 임베드 우측 프로필 아바타 이미지 */
        .embed-avatar {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            background-color: #2b2d31;
        }

        /* 하단 푸터 */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            color: #52525b;
            background-color: #1a1a1e;
            border-top: 1px solid #2f2f35;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Wissi KR WebSite</div>
        <a href="https://discord.gg/your-link" class="discord-btn" target="_blank">디스코드</a>
    </header>

    <main>
        <h1 class="main-title">Wissi KR</h1>
        <div class="sub-title">Official Website</div>

        <div class="embed-container">
            <div class="embed-content">
                <div class="embed-title">!! 방문자님이 입장했습니다.</div>
                <div class="embed-description">
                    <strong>환영합니다!</strong><br>
                    <span class="mention">@방문자</span>님,<br>
                    ZERO CLOUD에 오신걸<br>
                    환영합니다.
                </div>
                <div class="embed-footer" id="embed-footer">
                    입장 시간: 계산 중... | ID: 계산 중...
                </div>
            </div>
            <img class="embed-avatar" src="https://assets-global.website-files.com/6257adef93867e50d84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" alt="Avatar">
        </div>
    </main>

    <footer>
        &copy; 2026 Wissi KR. All rights reserved.
    </footer>

    <script>
        function initEmbed() {
            const footerElement = document.getElementById('embed-footer');
            
            // 1. 현재 접속한 시간 구하기 (YYYY년 MM월 DD일 HH:MM:SS)
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const formattedTime = `${year}년 ${month}월 ${day}일 ${hours}:${minutes}:${seconds}`;

            // 2. 디스코드 유저 ID 형태의 랜덤 18자리 숫자 생성
            let randomID = '';
            for (let i = 0; i < 18; i++) {
                randomID += Math.floor(Math.random() * 10);
            }

            // 3. 웹 화면에 데이터 반영
            footerElement.innerText = `입장 시간: ${formattedTime} | ID: ${randomID}`;
        }

        // 페이지 로드 시 실행
        window.onload = initEmbed;
    </script>

</body>
</html>
