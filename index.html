<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wissi KR WebSite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background-color: #36393f; /* 회색 배경 (디스코드 느낌의 차분한 회색) */
            color: #ffffff; /* 기본 텍스트 색상을 흰색으로 변경 */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 상단 영역: [세로3줄] Wissi KR WebSite  ---  [디스코드] */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #2f3136; /* 상단바는 조금 더 어두운 회색으로 구분 */
        }

        /* 좌측 메뉴 버튼과 이름을 묶어주는 컨테이너 */
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px; /* 세로 3줄 메뉴와 이름 사이의 간격 */
        }

        /* 세로 3줄 아이콘 (흰색 햄버거 메뉴) */
        .menu-icon {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 20px;
            height: 16px;
            cursor: pointer;
        }

        .menu-icon span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: #ffffff; /* 흰색 메뉴선 */
            border-radius: 2px;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffffff; /* 흰색 이름 유지 */
        }

        /* 맨 우측 디스코드 버튼 (디스코드 색상 배경) */
        .discord-link {
            background-color: #5865F2; /* 디스코드 공식 브랜드 색상 */
            color: #ffffff; /* 글자색 흰색 */
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 5px; /* 부드러운 라운드 처리 */
            font-weight: bold;
            font-size: 0.95rem;
            transition: background-color 0.2s;
        }

        .discord-link:hover {
            background-color: #4752C4; /* 마우스 올렸을 때 조금 더 어두운 파란색 */
        }

        /* 가로 구분선 */
        hr {
            border: 0;
            border-top: 1px solid #202225; /* 회색 배경에 어울리는 어두운 구분선 */
            width: 100%;
        }

        /* 중앙 영역: Wissi KR Official Website */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .main-title {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #ffffff;
        }

        .sub-title {
            font-size: 1.5rem;
            color: #b9bbbe; /* 부제목은 밝은 회색으로 밸런스 유지 */
        }
    </style>
</head>
<body>

    <!-- 상단 레이아웃 -->
    <header>
        <div class="header-left">
            <!-- 세로 3줄 메뉴 아이콘 -->
            <div class="menu-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <!-- 흰색 이름 -->
            <div class="logo">Wissi KR WebSite</div>
        </div>
        <!-- 디스코드 색상 배경의 버튼 -->
        <a href="https://discord.gg/pKeMtqWnws" class="discord-link">디스코드</a>
    </header>

    <hr>

    <!-- 중앙 배치 -->
    <main>
        <h1 class="main-title">Wissi KR</h1>
        <div class="sub-title">Official Website</div>
    </main>

</body>
</html>
